name: Publish

on:
  push:
    branches: [release/*]

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

  blackbox:
    name: NightJar blackbox tests
    runs-on: ubuntu-latest
    env:
      BLACKBOX_REPOSITORY: ${{ vars.BLACKBOX_REPOSITORY }}
      BLACKBOX_SSH_KEY: ${{ secrets.BLACKBOX_SSH_KEY }}
    steps:
      - name: Checkout FYLO
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Pack package under test
        id: pack
        run: |
          npm pack --json --ignore-scripts > /tmp/fylo-pack.json
          filename=$(node -e "console.log(require('/tmp/fylo-pack.json')[0].filename)")
          echo "tarball=$PWD/$filename" >> "$GITHUB_OUTPUT"

      - name: Require private blackbox credentials
        run: |
          if [ -z "$BLACKBOX_REPOSITORY" ]; then
            echo "::error::Missing BLACKBOX_REPOSITORY variable"
            exit 1
          fi
          if [ -z "$BLACKBOX_SSH_KEY" ]; then
            echo "::error::Missing BLACKBOX_SSH_KEY secret"
            exit 1
          fi

      - name: Checkout private blackbox suite
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BLACKBOX_REPOSITORY }}
          ssh-key: ${{ env.BLACKBOX_SSH_KEY }}
          ref: ${{ vars.FYLO_BLACKBOX_REF || vars.NIGHTJAR_BLACKBOX_REF || 'main' }}
          path: .blackbox-tests

      - name: Run FYLO blackbox tests
        working-directory: .blackbox-tests
        env:
          FYLO_PACKAGE_TARBALL: ${{ steps.pack.outputs.tarball }}
          NIGHTJAR_SUITE: fylo
        run: |
          if [ -f package.json ] || [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          fi

          if [ -f package.json ] && jq -e '.scripts.blackbox' package.json >/dev/null; then
            bun run blackbox
          else
            bun test fylo --timeout 120000
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, blackbox]
    permissions:
      contents: write   # create git tags
      id-token: write   # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Setup Node and upgrade npm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Resolve version from branch
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Branch version ($VERSION) does not match package.json ($PKG_VERSION). Skipping publish."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: |
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          npm publish --access public --provenance

      - name: Create and push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}" --force

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
