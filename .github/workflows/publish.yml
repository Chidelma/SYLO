name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

  blackbox:
    name: NightJar blackbox tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      BLACKBOX_REPOSITORY: ${{ vars.BLACKBOX_REPOSITORY }}
      BLACKBOX_SSH_KEY: ${{ secrets.BLACKBOX_SSH_KEY }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout FYLO
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Pack package under test
        id: pack
        run: |
          npm pack --json --ignore-scripts > /tmp/fylo-pack.json
          filename=$(node -e "console.log(require('/tmp/fylo-pack.json')[0].filename)")
          echo "tarball=$PWD/$filename" >> "$GITHUB_OUTPUT"

      - name: Require private blackbox credentials
        run: |
          if [ -z "$BLACKBOX_REPOSITORY" ]; then
            echo "::error::Missing BLACKBOX_REPOSITORY variable"
            exit 1
          fi
          if [ -z "$BLACKBOX_SSH_KEY" ]; then
            echo "::error::Missing BLACKBOX_SSH_KEY secret"
            exit 1
          fi

      - name: Checkout private blackbox suite
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BLACKBOX_REPOSITORY }}
          ssh-key: ${{ env.BLACKBOX_SSH_KEY }}
          ref: ${{ vars.FYLO_BLACKBOX_REF || vars.NIGHTJAR_BLACKBOX_REF || 'main' }}
          path: .blackbox-tests

      - name: Configure scoped registry for blackbox consumers
        run: |
          cat > "$HOME/.npmrc" <<'EOF'
          @d31ma:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF

      - name: Run FYLO blackbox tests
        working-directory: .blackbox-tests
        env:
          FYLO_PACKAGE_TARBALL: ${{ steps.pack.outputs.tarball }}
          NIGHTJAR_SUITE: fylo
        run: |
          if [ -f package.json ] || [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          fi

          if [ -f package.json ] && jq -e '.scripts.blackbox' package.json >/dev/null; then
            bun run blackbox
          else
            bun test fylo --timeout 120000
          fi

  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: read
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version tag
        id: check
        env:
          TAG: v${{ steps.read.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; skipping publish and release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [test, blackbox, version]
    if: needs.version.outputs.tag_exists == 'false'
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@d31ma'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: needs.version.outputs.tag_exists == 'false'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
